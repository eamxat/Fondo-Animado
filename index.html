<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fondo Orgánico - Three.js</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: fixed; 
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none; 
        }

        /* ========================================================
           SISTEMA DE CONTROLES HORIZONTALES (DIMENSIONES FIJAS)
           ======================================================== */
        #ui-wrapper {
            position: fixed; 
            top: 65px; 
            left: 0; 
            display: flex;
            align-items: center;
            justify-content: flex-start; 
            gap: 5px; 
            z-index: 2147483647; 
            pointer-events: none; 
            isolation: isolate; 
        }

        #panel-toggle {
            pointer-events: auto;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 34px; 
            height: 34px; 
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            transition: background 0.2s, transform 0.2s;
            user-select: none;
            flex-shrink: 0;
        }

        #panel-toggle:hover {
            background: rgba(45, 45, 45, 1);
        }

        #horizontal-toolbar {
            pointer-events: auto;
            width: 1342px; 
            height: 34px; 
            box-sizing: border-box; 
            
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 0 15px; 
            
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease, padding 0.4s ease;
            opacity: 1;
            
            overflow-x: auto;
            overflow-y: hidden; 
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            scrollbar-width: none; 
        }

        #horizontal-toolbar::-webkit-scrollbar {
            display: none; 
        }

        #horizontal-toolbar.collapsed {
            width: 0;
            padding-left: 0;
            padding-right: 0;
            opacity: 0;
            overflow: hidden;
            border-color: transparent;
            box-shadow: none;
            gap: 0;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px; 
            color: #ddd;
            user-select: none;
            height: 100%; 
        }

        input[type="range"] {
            width: 70px;
            height: 10px; 
            accent-color: #fff;
            cursor: pointer;
        }

        input[type="text"].hex-input {
            width: 58px;
            height: 22px; 
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            padding: 0 4px; 
            border-radius: 4px;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }
        
        input[type="text"].hex-input:focus {
            border-color: #fff;
        }
        
        input[type="text"].hex-input.error {
            border-color: #ff4444;
            color: #ff4444;
        }

        input[type="checkbox"] {
            cursor: pointer;
            accent-color: #fff;
            width: 14px;
            height: 14px;
        }
        
        .separator {
            width: 1px;
            height: 18px; 
            background: rgba(255,255,255,0.25);
            margin: 0 2px;
        }
    </style>
</head>
<body>
    <div id="ui-wrapper">
        <div id="panel-toggle" title="Ocultar/Mostrar Controles">×</div>

        <div id="horizontal-toolbar">
            <div class="control-group">
                <label for="ctrl-color1">Base</label>
                <input type="text" id="ctrl-color1" class="hex-input" spellcheck="false" autocomplete="off" maxlength="7">
            </div>
            <div class="control-group">
                <label for="ctrl-color2">Medio</label>
                <input type="text" id="ctrl-color2" class="hex-input" spellcheck="false" autocomplete="off" maxlength="7">
            </div>
            <div class="control-group">
                <label for="ctrl-color3">Pico</label>
                <input type="text" id="ctrl-color3" class="hex-input" spellcheck="false" autocomplete="off" maxlength="7">
            </div>
            
            <div class="separator"></div>
            
            <div class="control-group" title="Desplazamiento">
                <label for="ctrl-offset">Desplaz.</label>
                <input type="range" id="ctrl-offset" min="0" max="2" step="0.01">
            </div>
            <div class="control-group">
                <label for="ctrl-contrast">Contraste</label>
                <input type="range" id="ctrl-contrast" min="0" max="5" step="0.01">
            </div>
            
            <div class="separator"></div>
            
            <div class="control-group">
                <label for="ctrl-speed">Velocidad</label>
                <input type="range" id="ctrl-speed" min="0" max="1" step="0.01">
            </div>
            <div class="control-group">
                <label for="ctrl-elevation">Altura</label>
                <input type="range" id="ctrl-elevation" min="0" max="5" step="0.01">
            </div>
            <div class="control-group">
                <label for="ctrl-frequency">Detalle</label>
                <input type="range" id="ctrl-frequency" min="0.05" max="1" step="0.01">
            </div>
            
            <div class="separator"></div>

            <div class="control-group">
                <label for="ctrl-wireframe">Malla</label>
                <input type="checkbox" id="ctrl-wireframe">
            </div>
        </div>
    </div>

    <!-- WebGL Canvas Container -->
    <div id="canvas-container"></div>

    <!-- Load Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- ============================================== -->
    <!-- VERTEX SHADER -->
    <!-- ============================================== -->
    <script type="x-shader/x-vertex" id="vertexShader">
        uniform float uTime;
        uniform float uSpeed;
        uniform float uElevation;
        uniform float uFrequency;

        varying vec2 vUv;
        varying float vElevation;

        vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x, 289.0);}
        vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}

        float snoise(vec3 v){
            const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
            const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);

            vec3 i  = floor(v + dot(v, C.yyy) );
            vec3 x0 = v - i + dot(i, C.xxx) ;

            vec3 g = step(x0.yzx, x0.xyz);
            vec3 l = 1.0 - g;
            vec3 i1 = min( g.xyz, l.zxy );
            vec3 i2 = max( g.xyz, l.zxy );

            vec3 x1 = x0 - i1 + 1.0 * C.xxx;
            vec3 x2 = x0 - i2 + 2.0 * C.xxx;
            vec3 x3 = x0 - 1.0 + 3.0 * C.xxx;

            i = mod(i, 289.0 );
            vec4 p = permute( permute( permute(
                        i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                    + i.y + vec4(0.0, i1.y, i2.y, 1.0 ))
                    + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));

            float n_ = 1.0/7.0; // N=7
            vec3  ns = n_ * D.wyz - D.xzx;

            vec4 j = p - 49.0 * floor(p * ns.z *ns.z);

            vec4 x_ = floor(j * ns.z);
            vec4 y_ = floor(j - 7.0 * x_ );

            vec4 x = x_ *ns.x + ns.yyyy;
            vec4 y = y_ *ns.x + ns.yyyy;
            vec4 h = 1.0 - abs(x) - abs(y);

            vec4 b0 = vec4( x.xy, y.xy );
            vec4 b1 = vec4( x.zw, y.zw );

            vec4 s0 = floor(b0)*2.0 + 1.0;
            vec4 s1 = floor(b1)*2.0 + 1.0;
            vec4 sh = -step(h, vec4(0.0));

            vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
            vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;

            vec3 p0 = vec3(a0.xy,h.x);
            vec3 p1 = vec3(a0.zw,h.y);
            vec3 p2 = vec3(a1.xy,h.z);
            vec3 p3 = vec3(a1.zw,h.w);

            vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
            p0 *= norm.x;
            p1 *= norm.y;
            p2 *= norm.z;
            p3 *= norm.w;

            vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
            m = m * m;
            return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
        }

        void main() {
            vUv = uv;
            vec4 modelPosition = modelMatrix * vec4(position, 1.0);

            float elevation = snoise(vec3(
                modelPosition.x * uFrequency, 
                modelPosition.y * uFrequency, 
                uTime * uSpeed
            )) * uElevation;

            elevation += snoise(vec3(
                modelPosition.x * uFrequency * 2.5, 
                modelPosition.y * uFrequency * 2.5, 
                uTime * uSpeed * 1.5
            )) * (uElevation * 0.2);

            modelPosition.z += elevation;
            vElevation = elevation;

            vec4 viewPosition = viewMatrix * modelPosition;
            vec4 projectedPosition = projectionMatrix * viewPosition;

            gl_Position = projectedPosition;
        }
    </script>

    <!-- ============================================== -->
    <!-- FRAGMENT SHADER -->
    <!-- ============================================== -->
    <script type="x-shader/x-fragment" id="fragmentShader">
        uniform vec3 uColor1;
        uniform vec3 uColor2;
        uniform vec3 uColor3;
        uniform float uColorOffset;
        uniform float uColorMultiplier;

        varying vec2 vUv;
        varying float vElevation;

        void main() {
            float mixStrength = (vElevation + uColorOffset) * uColorMultiplier;

            vec3 color = mix(uColor1, uColor2, smoothstep(0.0, 0.5, mixStrength));
            color = mix(color, uColor3, smoothstep(0.5, 1.0, mixStrength));

            gl_FragColor = vec4(color, 1.0);
        }
    </script>

    <!-- ============================================== -->
    <!-- MAIN JAVASCRIPT: POLLING ACTIVO SIN EVENTOS    -->
    <!-- ============================================== -->
    <script>
        let scene, camera, renderer, material, mesh;
        let clock = new THREE.Clock();

        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;

        const STORAGE_KEY = 'organic_bg_config_v3_polling';

        const defaultConfig = {
            color1: '#15062a',
            color2: '#91165b',
            color3: '#ff8822',
            speed: 0.15,
            elevation: 1.4,
            frequency: 0.25,
            colorOffset: 0.6,
            colorMultiplier: 1.1,
            wireframe: false,
            isPanelOpen: true 
        };

        let config = { ...defaultConfig };
        let saveTimeout = null;

        // Lista de controles a escanear en cada frame
        const controlsList = [
            { id: 'ctrl-color1', key: 'color1', type: 'color', uniform: 'uColor1' },
            { id: 'ctrl-color2', key: 'color2', type: 'color', uniform: 'uColor2' },
            { id: 'ctrl-color3', key: 'color3', type: 'color', uniform: 'uColor3' },
            { id: 'ctrl-offset', key: 'colorOffset', type: 'float', uniform: 'uColorOffset' },
            { id: 'ctrl-contrast', key: 'colorMultiplier', type: 'float', uniform: 'uColorMultiplier' },
            { id: 'ctrl-speed', key: 'speed', type: 'float', uniform: 'uSpeed' },
            { id: 'ctrl-elevation', key: 'elevation', type: 'float', uniform: 'uElevation' },
            { id: 'ctrl-frequency', key: 'frequency', type: 'float', uniform: 'uFrequency' },
            { id: 'ctrl-wireframe', key: 'wireframe', type: 'bool' }
        ];

        function loadConfig() {
            try {
                const savedConfig = localStorage.getItem(STORAGE_KEY);
                if (savedConfig) {
                    config = { ...config, ...JSON.parse(savedConfig) };
                }
            } catch (e) {
                console.error("Error al cargar configuración", e);
            }
        }

        // Guardado con debounce para no sobrecargar el disco en el loop de 60fps
        function requestSave() {
            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
            }, 500);
        }

        function init() {
            loadConfig();

            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, -1, 5); 
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
            container.appendChild(renderer.domElement);

            material = new THREE.ShaderMaterial({
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                uniforms: {
                    uTime: { value: 0 },
                    uSpeed: { value: config.speed },
                    uElevation: { value: config.elevation },
                    uFrequency: { value: config.frequency },
                    uColor1: { value: new THREE.Color(config.color1) },
                    uColor2: { value: new THREE.Color(config.color2) },
                    uColor3: { value: new THREE.Color(config.color3) },
                    uColorOffset: { value: config.colorOffset },
                    uColorMultiplier: { value: config.colorMultiplier }
                },
                wireframe: config.wireframe,
                side: THREE.DoubleSide
            });

            const geometry = new THREE.PlaneGeometry(25, 25, 256, 256);
            mesh = new THREE.Mesh(geometry, material);
            
            mesh.rotation.x = -Math.PI * 0.25; 
            scene.add(mesh);

            setupUIValues();

            window.addEventListener('resize', onWindowResize, { passive: true });
            document.addEventListener('mousemove', onMouseMove, { passive: true });

            animate();
        }

        function setupUIValues() {
            const toggleBtn = document.getElementById('panel-toggle');
            const toolbar = document.getElementById('horizontal-toolbar');

            if (!config.isPanelOpen) {
                toolbar.classList.add('collapsed');
                toggleBtn.innerHTML = '≡';
            }

            // Agregamos múltiples eventos para asegurar que alguno pase las restricciones de xat
            ['pointerdown', 'mousedown', 'touchstart'].forEach(eventType => {
                toggleBtn.addEventListener(eventType, (e) => {
                    e.stopPropagation();
                    config.isPanelOpen = !config.isPanelOpen;
                    requestSave();
                    
                    if (config.isPanelOpen) {
                        toolbar.classList.remove('collapsed');
                        toggleBtn.innerHTML = '×';
                    } else {
                        toolbar.classList.add('collapsed');
                        toggleBtn.innerHTML = '≡';
                    }
                }, { once: false });
            });

            // Setear valores iniciales en el DOM para que cuadren con la configuración
            controlsList.forEach(c => {
                const el = document.getElementById(c.id);
                if (el) {
                    if (c.type === 'bool') el.checked = !!config[c.key];
                    else el.value = config[c.key];
                }
            });
        }

        // ==========================================
        // SISTEMA DE POLLING AUTÓNOMO (RESISTENTE A XAT)
        // Se ejecuta 60 veces por segundo. NO usa eventos.
        // ==========================================
        function pollDOMAndSync() {
            if (!material) return;
            let changesDetected = false;

            controlsList.forEach(c => {
                const el = document.getElementById(c.id);
                if (!el) return;

                if (c.type === 'color') {
                    const val = el.value.trim();
                    // Validar formato HEX
                    if (/^#([0-9A-Fa-f]{3}){1,2}$/i.test(val) && val !== config[c.key]) {
                        config[c.key] = val;
                        material.uniforms[c.uniform].value.set(val);
                        el.classList.remove('error');
                        changesDetected = true;
                    } else if (!/^#([0-9A-Fa-f]{3}){1,2}$/i.test(val) && val !== config[c.key]) {
                        el.classList.add('error');
                    }
                } 
                else if (c.type === 'float') {
                    const val = parseFloat(el.value);
                    if (!isNaN(val) && val !== config[c.key]) {
                        config[c.key] = val;
                        material.uniforms[c.uniform].value = val;
                        changesDetected = true;
                    }
                } 
                else if (c.type === 'bool') {
                    const val = el.checked;
                    if (val !== config[c.key]) {
                        config[c.key] = val;
                        material.wireframe = val;
                        material.needsUpdate = true;
                        changesDetected = true;
                    }
                }
            });

            // Si se detectó que el DOM cambió, solicitar guardado en LocalStorage
            if (changesDetected) {
                requestSave();
            }
        }

        function onMouseMove(event) {
            targetX = (event.clientX / window.innerWidth) * 2 - 1;
            targetY = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function onWindowResize() {
            if(!camera || !renderer) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // LOOP CONSTANTE - Aquí ocurre la magia antibloqueos
        function animate() {
            requestAnimationFrame(animate);

            if (!material || !renderer) return;

            // 1. Escanear el DOM en tiempo real a la fuerza
            pollDOMAndSync();

            // 2. Actualizar el tiempo del shader
            const elapsedTime = clock.getElapsedTime();
            material.uniforms.uTime.value = elapsedTime;

            // 3. Movimiento de la cámara (parallax suave)
            mouseX += (targetX - mouseX) * 0.05;
            mouseY += (targetY - mouseY) * 0.05;
            camera.position.x = mouseX * 1.5;
            camera.position.y = (mouseY * 0.5) - 1.0; 
            camera.lookAt(0, 0, 0);

            // 4. Renderizar (Siempre activo)
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
