<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fondo Orgánico - Three.js</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: fixed; /* Fixed previene problemas de scroll en iframes */
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none; /* Que el canvas no robe clicks de los overlays externos */
        }

        /* ========================================================
           SISTEMA DE CONTROLES HORIZONTALES (IZQUIERDA A DERECHA)
           BLINDADO PARA ENTORNOS RESTRINGIDOS COMO XAT
           ======================================================== */
        #ui-wrapper {
            position: fixed; /* Fijo a la ventana del iframe/navegador */
            top: 65px; 
            left: 20px; /* Movido a la IZQUIERDA */
            display: flex;
            align-items: center;
            justify-content: flex-start; /* Expansión hacia la DERECHA */
            gap: 10px;
            z-index: 2147483647; /* Z-Index máximo absoluto (32-bit) */
            pointer-events: none; 
            isolation: isolate; /* Crea un nuevo contexto de apilamiento */
        }

        #panel-toggle {
            pointer-events: auto;
            background: rgba(15, 15, 15, 0.95); /* Un poco más opaco para destacar */
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            transition: background 0.2s, transform 0.2s;
            user-select: none;
            flex-shrink: 0;
        }

        #panel-toggle:hover {
            background: rgba(45, 45, 45, 1);
        }

        #horizontal-toolbar {
            pointer-events: auto;
            max-width: calc(100vw - 90px); 
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 15px;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            
            transition: max-width 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease, padding 0.4s ease;
            opacity: 1;
            
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.4) transparent;
        }

        #horizontal-toolbar.collapsed {
            max-width: 0;
            padding-left: 0;
            padding-right: 0;
            opacity: 0;
            overflow: hidden;
            border-color: transparent;
            box-shadow: none;
            gap: 0;
        }

        #horizontal-toolbar::-webkit-scrollbar {
            height: 6px;
        }
        #horizontal-toolbar::-webkit-scrollbar-thumb {
            background-color: rgba(255,255,255,0.4);
            border-radius: 4px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #ddd;
            user-select: none;
        }

        input[type="range"] {
            width: 80px;
            accent-color: #fff;
            cursor: pointer;
        }

        input[type="text"].hex-input {
            width: 60px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            padding: 4px 6px;
            border-radius: 4px;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }
        
        input[type="text"].hex-input:focus {
            border-color: #fff;
        }
        
        input[type="text"].hex-input.error {
            border-color: #ff4444;
            color: #ff4444;
        }

        input[type="checkbox"] {
            cursor: pointer;
            accent-color: #fff;
            width: 16px;
            height: 16px;
        }
        
        .separator {
            width: 1px;
            height: 20px;
            background: rgba(255,255,255,0.25);
            margin: 0 5px;
        }
    </style>
</head>
<body>
    <!-- Contenedor general: Ahora el botón va primero para expandir a la derecha -->
    <div id="ui-wrapper">
        <!-- Botón Toggle siempre visible (Lado Izquierdo) -->
        <div id="panel-toggle" title="Ocultar/Mostrar Controles">×</div>

        <!-- Barra Horizontal de Controles (Se expande hacia la Derecha) -->
        <div id="horizontal-toolbar">
            <div class="control-group">
                <label for="ctrl-color1">Base</label>
                <input type="text" id="ctrl-color1" class="hex-input" spellcheck="false" autocomplete="off" maxlength="7">
            </div>
            <div class="control-group">
                <label for="ctrl-color2">Medio</label>
                <input type="text" id="ctrl-color2" class="hex-input" spellcheck="false" autocomplete="off" maxlength="7">
            </div>
            <div class="control-group">
                <label for="ctrl-color3">Pico</label>
                <input type="text" id="ctrl-color3" class="hex-input" spellcheck="false" autocomplete="off" maxlength="7">
            </div>
            
            <div class="separator"></div>
            
            <div class="control-group" title="Desplazamiento">
                <label for="ctrl-offset">Desplaz.</label>
                <input type="range" id="ctrl-offset" min="0" max="2" step="0.01">
            </div>
            <div class="control-group">
                <label for="ctrl-contrast">Contraste</label>
                <input type="range" id="ctrl-contrast" min="0" max="5" step="0.01">
            </div>
            
            <div class="separator"></div>
            
            <div class="control-group">
                <label for="ctrl-speed">Velocidad</label>
                <input type="range" id="ctrl-speed" min="0" max="1" step="0.01">
            </div>
            <div class="control-group">
                <label for="ctrl-elevation">Altura</label>
                <input type="range" id="ctrl-elevation" min="0" max="5" step="0.01">
            </div>
            <div class="control-group">
                <label for="ctrl-frequency">Detalle</label>
                <input type="range" id="ctrl-frequency" min="0.05" max="1" step="0.01">
            </div>
            
            <div class="separator"></div>

            <div class="control-group">
                <label for="ctrl-wireframe">Malla</label>
                <input type="checkbox" id="ctrl-wireframe">
            </div>
        </div>
    </div>

    <!-- WebGL Canvas Container -->
    <div id="canvas-container"></div>

    <!-- Load Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- ============================================== -->
    <!-- VERTEX SHADER -->
    <!-- ============================================== -->
    <script type="x-shader/x-vertex" id="vertexShader">
        uniform float uTime;
        uniform float uSpeed;
        uniform float uElevation;
        uniform float uFrequency;

        varying vec2 vUv;
        varying float vElevation;

        vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x, 289.0);}
        vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}

        float snoise(vec3 v){
            const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
            const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);

            vec3 i  = floor(v + dot(v, C.yyy) );
            vec3 x0 = v - i + dot(i, C.xxx) ;

            vec3 g = step(x0.yzx, x0.xyz);
            vec3 l = 1.0 - g;
            vec3 i1 = min( g.xyz, l.zxy );
            vec3 i2 = max( g.xyz, l.zxy );

            vec3 x1 = x0 - i1 + 1.0 * C.xxx;
            vec3 x2 = x0 - i2 + 2.0 * C.xxx;
            vec3 x3 = x0 - 1.0 + 3.0 * C.xxx;

            i = mod(i, 289.0 );
            vec4 p = permute( permute( permute(
                        i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                    + i.y + vec4(0.0, i1.y, i2.y, 1.0 ))
                    + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));

            float n_ = 1.0/7.0; // N=7
            vec3  ns = n_ * D.wyz - D.xzx;

            vec4 j = p - 49.0 * floor(p * ns.z *ns.z);

            vec4 x_ = floor(j * ns.z);
            vec4 y_ = floor(j - 7.0 * x_ );

            vec4 x = x_ *ns.x + ns.yyyy;
            vec4 y = y_ *ns.x + ns.yyyy;
            vec4 h = 1.0 - abs(x) - abs(y);

            vec4 b0 = vec4( x.xy, y.xy );
            vec4 b1 = vec4( x.zw, y.zw );

            vec4 s0 = floor(b0)*2.0 + 1.0;
            vec4 s1 = floor(b1)*2.0 + 1.0;
            vec4 sh = -step(h, vec4(0.0));

            vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
            vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;

            vec3 p0 = vec3(a0.xy,h.x);
            vec3 p1 = vec3(a0.zw,h.y);
            vec3 p2 = vec3(a1.xy,h.z);
            vec3 p3 = vec3(a1.zw,h.w);

            vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
            p0 *= norm.x;
            p1 *= norm.y;
            p2 *= norm.z;
            p3 *= norm.w;

            vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
            m = m * m;
            return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
        }

        void main() {
            vUv = uv;
            vec4 modelPosition = modelMatrix * vec4(position, 1.0);

            float elevation = snoise(vec3(
                modelPosition.x * uFrequency, 
                modelPosition.y * uFrequency, 
                uTime * uSpeed
            )) * uElevation;

            elevation += snoise(vec3(
                modelPosition.x * uFrequency * 2.5, 
                modelPosition.y * uFrequency * 2.5, 
                uTime * uSpeed * 1.5
            )) * (uElevation * 0.2);

            modelPosition.z += elevation;
            vElevation = elevation;

            vec4 viewPosition = viewMatrix * modelPosition;
            vec4 projectedPosition = projectionMatrix * viewPosition;

            gl_Position = projectedPosition;
        }
    </script>

    <!-- ============================================== -->
    <!-- FRAGMENT SHADER -->
    <!-- ============================================== -->
    <script type="x-shader/x-fragment" id="fragmentShader">
        uniform vec3 uColor1;
        uniform vec3 uColor2;
        uniform vec3 uColor3;
        uniform float uColorOffset;
        uniform float uColorMultiplier;

        varying vec2 vUv;
        varying float vElevation;

        void main() {
            float mixStrength = (vElevation + uColorOffset) * uColorMultiplier;

            vec3 color = mix(uColor1, uColor2, smoothstep(0.0, 0.5, mixStrength));
            color = mix(color, uColor3, smoothstep(0.5, 1.0, mixStrength));

            gl_FragColor = vec4(color, 1.0);
        }
    </script>

    <!-- ============================================== -->
    <!-- MAIN JAVASCRIPT -->
    <!-- ============================================== -->
    <script>
        let scene, camera, renderer, material, mesh;
        let clock = new THREE.Clock();

        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;

        const STORAGE_KEY = 'organic_bg_config_v2_xat';

        const defaultConfig = {
            color1: '#15062a',
            color2: '#91165b',
            color3: '#ff8822',
            speed: 0.15,
            elevation: 1.4,
            frequency: 0.25,
            colorOffset: 0.6,
            colorMultiplier: 1.1,
            wireframe: false,
            isPanelOpen: true 
        };

        let config = { ...defaultConfig };

        function loadConfig() {
            try {
                const savedConfig = localStorage.getItem(STORAGE_KEY);
                if (savedConfig) {
                    config = { ...config, ...JSON.parse(savedConfig) };
                }
            } catch (e) {
                console.error("Error al cargar configuración", e);
            }
        }

        function saveConfig() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
        }

        // ==========================================
        // RENDERIZADO FORZADO PARA IFRAMES/XAT
        // ==========================================
        function updateSceneRender() {
            if (!material || !renderer || !scene || !camera) return;

            material.uniforms.uColor1.value.set(config.color1);
            material.uniforms.uColor2.value.set(config.color2);
            material.uniforms.uColor3.value.set(config.color3);

            material.uniforms.uColorOffset.value = parseFloat(config.colorOffset);
            material.uniforms.uColorMultiplier.value = parseFloat(config.colorMultiplier);
            material.uniforms.uSpeed.value = parseFloat(config.speed);
            material.uniforms.uElevation.value = parseFloat(config.elevation);
            material.uniforms.uFrequency.value = parseFloat(config.frequency);

            if (material.wireframe !== config.wireframe) {
                material.wireframe = config.wireframe;
                material.needsUpdate = true;
            }

            // BLINDAJE: Forzar un render inmediato. Si el entorno xat bloquea
            // el requestAnimationFrame, esta línea garantiza visualización inmediata.
            renderer.render(scene, camera);
        }

        function init() {
            loadConfig();

            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, -1, 5); 
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
            container.appendChild(renderer.domElement);

            material = new THREE.ShaderMaterial({
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                uniforms: {
                    uTime: { value: 0 },
                    uSpeed: { value: 0 },
                    uElevation: { value: 0 },
                    uFrequency: { value: 0 },
                    uColor1: { value: new THREE.Color() },
                    uColor2: { value: new THREE.Color() },
                    uColor3: { value: new THREE.Color() },
                    uColorOffset: { value: 0 },
                    uColorMultiplier: { value: 0 }
                },
                wireframe: false,
                side: THREE.DoubleSide
            });

            const geometry = new THREE.PlaneGeometry(25, 25, 256, 256);
            mesh = new THREE.Mesh(geometry, material);
            
            mesh.rotation.x = -Math.PI * 0.25; 
            scene.add(mesh);

            updateSceneRender();
            setupCustomUI();

            // Usamos event listeners en window para maximizar la captura en iframes
            window.addEventListener('resize', onWindowResize, { passive: true });
            // Blindaje del movimiento de ratón, capturando desde todo el documento
            document.addEventListener('mousemove', onMouseMove, { passive: true });

            animate();
        }

        function setupCustomUI() {
            const toggleBtn = document.getElementById('panel-toggle');
            const toolbar = document.getElementById('horizontal-toolbar');

            if (!config.isPanelOpen) {
                toolbar.classList.add('collapsed');
                toggleBtn.innerHTML = '≡';
            }

            // Capturar evento 'pointerdown' (más resistente en iframes que click)
            toggleBtn.addEventListener('pointerdown', (e) => {
                e.stopPropagation(); // Prevenir interferencia de xat
                config.isPanelOpen = !config.isPanelOpen;
                saveConfig();
                
                if (config.isPanelOpen) {
                    toolbar.classList.remove('collapsed');
                    toggleBtn.innerHTML = '×';
                } else {
                    toolbar.classList.add('collapsed');
                    toggleBtn.innerHTML = '≡';
                }
            });

            function bindInput(id, configKey, isColorHex = false, isCheckbox = false) {
                const element = document.getElementById(id);
                if (!element) return;

                if (isCheckbox) {
                    element.checked = !!config[configKey];
                } else {
                    element.value = config[configKey];
                }

                // BLINDAJE: Escuchar 'input' y 'change' por redundancia.
                const handleEvent = (e) => {
                    e.stopPropagation(); // Clave para evitar el bloqueo del iframe superior
                    
                    let val = isCheckbox ? e.target.checked : e.target.value;
                    
                    if (isColorHex) {
                        val = val.trim();
                        if (/^#([0-9A-Fa-f]{3}){1,2}$/i.test(val)) {
                            element.classList.remove('error');
                            config[configKey] = val;
                        } else {
                            element.classList.add('error');
                            return; 
                        }
                    } else if (!isCheckbox) {
                        val = parseFloat(val);
                        if (isNaN(val)) return; 
                        config[configKey] = val;
                    } else {
                        config[configKey] = val;
                    }

                    saveConfig();
                    updateSceneRender();
                };

                element.addEventListener('input', handleEvent);
                element.addEventListener('change', handleEvent);
                // Previene que interactuar con el slider dispare eventos de la página de fondo
                element.addEventListener('pointerdown', (e) => e.stopPropagation());
            }

            bindInput('ctrl-color1', 'color1', true, false);
            bindInput('ctrl-color2', 'color2', true, false);
            bindInput('ctrl-color3', 'color3', true, false);
            
            bindInput('ctrl-offset', 'colorOffset', false, false);
            bindInput('ctrl-contrast', 'colorMultiplier', false, false);
            
            bindInput('ctrl-speed', 'speed', false, false);
            bindInput('ctrl-elevation', 'elevation', false, false);
            bindInput('ctrl-frequency', 'frequency', false, false);
            
            bindInput('ctrl-wireframe', 'wireframe', false, true);
        }

        function onMouseMove(event) {
            targetX = (event.clientX / window.innerWidth) * 2 - 1;
            targetY = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function onWindowResize() {
            if(!camera || !renderer) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            updateSceneRender(); // Forzar render al redimensionar
        }

        function animate() {
            requestAnimationFrame(animate);

            if (!material || !renderer) return;

            const elapsedTime = clock.getElapsedTime();
            material.uniforms.uTime.value = elapsedTime;

            mouseX += (targetX - mouseX) * 0.05;
            mouseY += (targetY - mouseY) * 0.05;
            
            camera.position.x = mouseX * 1.5;
            camera.position.y = (mouseY * 0.5) - 1.0; 
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
