<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fondo Orgánico - Three.js</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* ========================================================
           SISTEMA DE CONTROLES HORIZONTALES COLAPSABLES
           ======================================================== */
        #ui-wrapper {
            position: absolute;
            top: 65px; /* Altura especificada */
            right: 20px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            z-index: 9999; /* Prioridad visual máxima */
            pointer-events: none; /* Permite clicks a través del wrapper vacío */
        }

        #panel-toggle {
            pointer-events: auto;
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transition: background 0.2s, transform 0.2s;
            user-select: none;
            flex-shrink: 0;
        }

        #panel-toggle:hover {
            background: rgba(35, 35, 35, 0.9);
        }

        #horizontal-toolbar {
            pointer-events: auto;
            max-width: calc(100vw - 90px); /* Ajuste para el botón y márgenes */
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 15px;
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            
            /* Transiciones para colapsar/expandir horizontalmente */
            transition: max-width 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease, padding 0.4s ease;
            opacity: 1;
            
            /* Restricciones críticas para evitar crecimiento vertical */
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            
            /* Estilo del scrollbar horizontal */
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.3) transparent;
        }

        /* Estado colapsado: Oculta el panel reduciendo el ancho horizontal */
        #horizontal-toolbar.collapsed {
            max-width: 0;
            padding-left: 0;
            padding-right: 0;
            opacity: 0;
            overflow: hidden;
            border-color: transparent;
            box-shadow: none;
            gap: 0;
        }

        #horizontal-toolbar::-webkit-scrollbar {
            height: 6px;
        }
        #horizontal-toolbar::-webkit-scrollbar-thumb {
            background-color: rgba(255,255,255,0.3);
            border-radius: 4px;
        }

        /* Estilos de los controles individuales */
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #ddd;
            user-select: none;
        }

        /* Inputs de rango */
        input[type="range"] {
            width: 80px;
            accent-color: #fff;
            cursor: pointer;
        }

        /* Inputs de color (Texto HEX para evitar dropdowns nativos) */
        input[type="text"].hex-input {
            width: 60px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            padding: 4px 6px;
            border-radius: 4px;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }
        
        input[type="text"].hex-input:focus {
            border-color: #fff;
        }
        
        input[type="text"].hex-input.error {
            border-color: #ff4444;
            color: #ff4444;
        }

        /* Checkbox */
        input[type="checkbox"] {
            cursor: pointer;
            accent-color: #fff;
            width: 16px;
            height: 16px;
        }
        
        .separator {
            width: 1px;
            height: 20px;
            background: rgba(255,255,255,0.15);
            margin: 0 5px;
        }
    </style>
</head>
<body>
    <!-- Contenedor general para alineación y colapso -->
    <div id="ui-wrapper">
        <!-- Barra Horizontal de Controles -->
        <div id="horizontal-toolbar">
            <div class="control-group">
                <label for="ctrl-color1">Base</label>
                <input type="text" id="ctrl-color1" class="hex-input" spellcheck="false" autocomplete="off" maxlength="7">
            </div>
            <div class="control-group">
                <label for="ctrl-color2">Medio</label>
                <input type="text" id="ctrl-color2" class="hex-input" spellcheck="false" autocomplete="off" maxlength="7">
            </div>
            <div class="control-group">
                <label for="ctrl-color3">Pico</label>
                <input type="text" id="ctrl-color3" class="hex-input" spellcheck="false" autocomplete="off" maxlength="7">
            </div>
            
            <div class="separator"></div>
            
            <div class="control-group" title="Desplazamiento">
                <label for="ctrl-offset">Desplaz.</label>
                <input type="range" id="ctrl-offset" min="0" max="2" step="0.01">
            </div>
            <div class="control-group">
                <label for="ctrl-contrast">Contraste</label>
                <input type="range" id="ctrl-contrast" min="0" max="5" step="0.01">
            </div>
            
            <div class="separator"></div>
            
            <div class="control-group">
                <label for="ctrl-speed">Velocidad</label>
                <input type="range" id="ctrl-speed" min="0" max="1" step="0.01">
            </div>
            <div class="control-group">
                <label for="ctrl-elevation">Altura</label>
                <input type="range" id="ctrl-elevation" min="0" max="5" step="0.01">
            </div>
            <div class="control-group">
                <label for="ctrl-frequency">Detalle</label>
                <input type="range" id="ctrl-frequency" min="0.05" max="1" step="0.01">
            </div>
            
            <div class="separator"></div>

            <div class="control-group">
                <label for="ctrl-wireframe">Malla</label>
                <input type="checkbox" id="ctrl-wireframe">
            </div>
        </div>

        <!-- Botón Toggle siempre visible -->
        <div id="panel-toggle" title="Ocultar/Mostrar Controles">×</div>
    </div>

    <!-- WebGL Canvas Container -->
    <div id="canvas-container"></div>

    <!-- Load Three.js (Eliminamos dat.gui porque usamos UI nativa) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- ============================================== -->
    <!-- VERTEX SHADER: Handles the 3D waving distortion  -->
    <!-- ============================================== -->
    <script type="x-shader/x-vertex" id="vertexShader">
        uniform float uTime;
        uniform float uSpeed;
        uniform float uElevation;
        uniform float uFrequency;

        varying vec2 vUv;
        varying float vElevation;

        // Simplex 3D Noise function by Ian McEwan, Ashima Arts
        vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x, 289.0);}
        vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}

        float snoise(vec3 v){
            const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
            const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);

            vec3 i  = floor(v + dot(v, C.yyy) );
            vec3 x0 = v - i + dot(i, C.xxx) ;

            vec3 g = step(x0.yzx, x0.xyz);
            vec3 l = 1.0 - g;
            vec3 i1 = min( g.xyz, l.zxy );
            vec3 i2 = max( g.xyz, l.zxy );

            vec3 x1 = x0 - i1 + 1.0 * C.xxx;
            vec3 x2 = x0 - i2 + 2.0 * C.xxx;
            vec3 x3 = x0 - 1.0 + 3.0 * C.xxx;

            i = mod(i, 289.0 );
            vec4 p = permute( permute( permute(
                        i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                    + i.y + vec4(0.0, i1.y, i2.y, 1.0 ))
                    + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));

            float n_ = 1.0/7.0; // N=7
            vec3  ns = n_ * D.wyz - D.xzx;

            vec4 j = p - 49.0 * floor(p * ns.z *ns.z);

            vec4 x_ = floor(j * ns.z);
            vec4 y_ = floor(j - 7.0 * x_ );

            vec4 x = x_ *ns.x + ns.yyyy;
            vec4 y = y_ *ns.x + ns.yyyy;
            vec4 h = 1.0 - abs(x) - abs(y);

            vec4 b0 = vec4( x.xy, y.xy );
            vec4 b1 = vec4( x.zw, y.zw );

            vec4 s0 = floor(b0)*2.0 + 1.0;
            vec4 s1 = floor(b1)*2.0 + 1.0;
            vec4 sh = -step(h, vec4(0.0));

            vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
            vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;

            vec3 p0 = vec3(a0.xy,h.x);
            vec3 p1 = vec3(a0.zw,h.y);
            vec3 p2 = vec3(a1.xy,h.z);
            vec3 p3 = vec3(a1.zw,h.w);

            vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
            p0 *= norm.x;
            p1 *= norm.y;
            p2 *= norm.z;
            p3 *= norm.w;

            vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
            m = m * m;
            return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
        }

        void main() {
            vUv = uv;
            
            // 1. Get the vertex's original position in the local model space
            vec4 modelPosition = modelMatrix * vec4(position, 1.0);

            // 2. Generate elevation using the simplex 3D noise function
            float elevation = snoise(vec3(
                modelPosition.x * uFrequency, 
                modelPosition.y * uFrequency, 
                uTime * uSpeed
            )) * uElevation;

            // 3. Add a smaller secondary detail layer of noise (fractal-like)
            elevation += snoise(vec3(
                modelPosition.x * uFrequency * 2.5, 
                modelPosition.y * uFrequency * 2.5, 
                uTime * uSpeed * 1.5
            )) * (uElevation * 0.2);

            // 4. Apply elevation to the Z axis
            modelPosition.z += elevation;
            
            // Pass the resulting elevation to the fragment shader for coloring
            vElevation = elevation;

            // 5. Final projection matrix steps
            vec4 viewPosition = viewMatrix * modelPosition;
            vec4 projectedPosition = projectionMatrix * viewPosition;

            gl_Position = projectedPosition;
        }
    </script>

    <!-- ============================================== -->
    <!-- FRAGMENT SHADER: Handles the fluid color mixing  -->
    <!-- ============================================== -->
    <script type="x-shader/x-fragment" id="fragmentShader">
        uniform vec3 uColor1;
        uniform vec3 uColor2;
        uniform vec3 uColor3;
        uniform float uColorOffset;
        uniform float uColorMultiplier;

        varying vec2 vUv;
        varying float vElevation;

        void main() {
            // Remap elevation into a 0.0 - 1.0 range based on uniforms
            float mixStrength = (vElevation + uColorOffset) * uColorMultiplier;

            // Clamp and smoothly interpolate between the 3 colors
            vec3 color = mix(uColor1, uColor2, smoothstep(0.0, 0.5, mixStrength));
            color = mix(color, uColor3, smoothstep(0.5, 1.0, mixStrength));

            gl_FragColor = vec4(color, 1.0);
        }
    </script>

    <!-- ============================================== -->
    <!-- MAIN JAVASCRIPT: Three.js Setup & Animation    -->
    <!-- ============================================== -->
    <script>
        let scene, camera, renderer, material, mesh;
        let clock = new THREE.Clock();

        // Parallax mouse variables
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;

        // Clave para guardar en LocalStorage
        const STORAGE_KEY = 'organic_bg_config_v1';

        // Valores por defecto
        const defaultConfig = {
            color1: '#15062a',
            color2: '#91165b',
            color3: '#ff8822',
            speed: 0.15,
            elevation: 1.4,
            frequency: 0.25,
            colorOffset: 0.6,
            colorMultiplier: 1.1,
            wireframe: false,
            isPanelOpen: true // Persistencia del estado colapsado/expandido
        };

        // Estado actual (se mezcla con localStorage si existe)
        let config = { ...defaultConfig };

        function loadConfig() {
            try {
                const savedConfig = localStorage.getItem(STORAGE_KEY);
                if (savedConfig) {
                    config = { ...config, ...JSON.parse(savedConfig) };
                }
            } catch (e) {
                console.error("Error al cargar configuración", e);
            }
        }

        function saveConfig() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
        }

        function init() {
            // Cargar datos previos antes de inicializar la escena
            loadConfig();

            const container = document.getElementById('canvas-container');

            // 1. Core Scene Setup
            scene = new THREE.Scene();

            // 2. Camera Setup (Perspective for depth)
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, -1, 5); // Start slightly angled
            camera.lookAt(0, 0, 0);

            // 3. Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Limit pixel ratio for performance
            container.appendChild(renderer.domElement);

            // 4. Custom Shader Material
            material = new THREE.ShaderMaterial({
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                uniforms: {
                    uTime: { value: 0 },
                    uSpeed: { value: config.speed },
                    uElevation: { value: config.elevation },
                    uFrequency: { value: config.frequency },
                    uColor1: { value: new THREE.Color(config.color1) },
                    uColor2: { value: new THREE.Color(config.color2) },
                    uColor3: { value: new THREE.Color(config.color3) },
                    uColorOffset: { value: config.colorOffset },
                    uColorMultiplier: { value: config.colorMultiplier }
                },
                wireframe: config.wireframe,
                side: THREE.DoubleSide
            });

            // 5. High-Resolution Plane Geometry (needed for smooth vertex waves)
            const geometry = new THREE.PlaneGeometry(25, 25, 256, 256);
            mesh = new THREE.Mesh(geometry, material);
            
            // Tilt the plane backwards to create depth/perspective
            mesh.rotation.x = -Math.PI * 0.25; 
            scene.add(mesh);

            // 6. Setup Interactive Control Panel nativo
            setupCustomUI();

            // 7. Event Listeners
            window.addEventListener('resize', onWindowResize, false);
            document.addEventListener('mousemove', onMouseMove, false);

            // 8. Start loop
            animate();
        }

        function setupCustomUI() {
            // Lógica de Colapso/Expansión del Panel
            const toggleBtn = document.getElementById('panel-toggle');
            const toolbar = document.getElementById('horizontal-toolbar');

            // Restaurar estado visual inicial basado en la configuración guardada
            if (!config.isPanelOpen) {
                toolbar.classList.add('collapsed');
                toggleBtn.innerHTML = '≡';
            }

            toggleBtn.addEventListener('click', () => {
                config.isPanelOpen = !config.isPanelOpen;
                saveConfig();
                
                if (config.isPanelOpen) {
                    toolbar.classList.remove('collapsed');
                    toggleBtn.innerHTML = '×';
                } else {
                    toolbar.classList.add('collapsed');
                    toggleBtn.innerHTML = '≡';
                }
            });

            // Función auxiliar para enlazar inputs HTML con Three.js y el Config
            function bindInput(id, configKey, isColorHex = false, isCheckbox = false, uniformName = '') {
                const element = document.getElementById(id);
                if (!element) return;

                // Establecer valor inicial del DOM desde el config cargado
                if (isCheckbox) {
                    element.checked = config[configKey];
                } else {
                    element.value = config[configKey];
                }

                // Escuchar cambios ('input' reacciona en tiempo real al arrastrar/escribir)
                element.addEventListener('input', (e) => {
                    let val = isCheckbox ? e.target.checked : e.target.value;
                    
                    // Si es entrada de color Hexadecimal, validar antes de aplicar
                    if (isColorHex) {
                        val = val.trim();
                        // Validar formato HEX (#123456)
                        if (/^#[0-9A-Fa-f]{6}$/.test(val)) {
                            element.classList.remove('error');
                            config[configKey] = val;
                            saveConfig();
                            if (material) material.uniforms[uniformName].value.set(val);
                        } else {
                            // Mostrar error visual si el HEX es inválido (no guardar ni aplicar)
                            element.classList.add('error');
                        }
                        return; // Terminar aquí para inputs de color
                    }

                    // Asegurar que los rangos sean números flotantes
                    if (!isCheckbox) val = parseFloat(val);

                    // Actualizar estado y guardar localmente en silencio
                    config[configKey] = val;
                    saveConfig();

                    // Actualizar el shader de Three.js inmediatamente
                    if (material) {
                        if (isCheckbox) {
                            material.wireframe = val;
                        } else {
                            material.uniforms[uniformName].value = val;
                        }
                    }
                });
            }

            // Enlazar cada elemento de la UI con su respectiva variable y uniform
            bindInput('ctrl-color1', 'color1', true, false, 'uColor1');
            bindInput('ctrl-color2', 'color2', true, false, 'uColor2');
            bindInput('ctrl-color3', 'color3', true, false, 'uColor3');
            
            bindInput('ctrl-offset', 'colorOffset', false, false, 'uColorOffset');
            bindInput('ctrl-contrast', 'colorMultiplier', false, false, 'uColorMultiplier');
            
            bindInput('ctrl-speed', 'speed', false, false, 'uSpeed');
            bindInput('ctrl-elevation', 'elevation', false, false, 'uElevation');
            bindInput('ctrl-frequency', 'frequency', false, false, 'uFrequency');
            
            bindInput('ctrl-wireframe', 'wireframe', false, true);
        }

        function onMouseMove(event) {
            targetX = (event.clientX / window.innerWidth) * 2 - 1;
            targetY = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();
            material.uniforms.uTime.value = elapsedTime;

            mouseX += (targetX - mouseX) * 0.05;
            mouseY += (targetY - mouseY) * 0.05;
            
            camera.position.x = mouseX * 1.5;
            camera.position.y = (mouseY * 0.5) - 1.0; 
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
